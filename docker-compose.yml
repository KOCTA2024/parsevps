services:
  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  # ── Worker (всегда живёт, слушает очередь) ────────────────────────────────
  worker:
    build: .
    command: node src/worker.js
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKER_CONCURRENCY: 2
    volumes:
      - ./src:/app/src
      - ./src/data:/app/data
      - state:/app/state
    depends_on:
      redis:
        condition: service_healthy
  # ── Monitor + Orchestrator (cron, раз в 24 ч) ────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "while true; do HOUR=$$(date -u +%H); MIN=$$(date -u +%M); if [ \"$$HOUR\" = '01' ] && [ \"$$MIN\" = '00' ]; then node src/monitor.js && node src/orchestrator.js >> /app/state/scheduler.log 2>&1; sleep 61; fi; sleep 30; done"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MATCHES_FILE: /app/state/matches.json
    volumes:
      - ./src:/app/src
      - ./src/data:/app/data
      - state:/app/state
      - ./scheduler.crontab:/etc/crontabs/scheduler:ro
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
volumes:
  state:   # изолированный volume для matches.json